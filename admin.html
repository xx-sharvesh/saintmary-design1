<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Saint Mary Coptic Orthodox Church</title>
  <style>
    :root {
      --navy: #05152d;
      --navy-mid: #0e2c56;
      --navy-light: #123b73;
      --gold: #d7b24a;
      --gold-light: #f2d77b;
      --cream: #faf8f3;
      --white: #ffffff;
      --text: #152033;
      --gray: #888;
      --border: #e5e0d8;
      --danger: #c0392b;
      --success: #1e8449;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, 'Times New Roman', serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    .admin-header {
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      color: var(--white);
      padding: 1.5rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid var(--gold);
    }
    .admin-header h1 { font-size: 1.3rem; font-weight: normal; }
    .admin-header .sub { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 0.2rem; }

    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* LOGIN */
    .login-card {
      background: var(--white); border-radius: 12px; padding: 3rem;
      max-width: 440px; margin: 4rem auto;
      box-shadow: 0 8px 32px rgba(5,21,45,0.15); border-top: 4px solid var(--gold);
    }
    .login-card h2 { color: var(--navy); margin-bottom: 0.4rem; font-size: 1.5rem; }
    .login-card > p { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }
    .login-hint { text-align: center; margin-top: 1.5rem; color: var(--gray); font-size: 0.85rem; }
    .login-hint strong { color: var(--navy-mid); }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; margin-bottom: 0.4rem;
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--navy-mid);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 0.95rem; color: var(--text);
      background: var(--white); transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(215,178,74,0.18);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.65rem 1.4rem; border: none; border-radius: 6px;
      font-family: inherit; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s; text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-navy { background: var(--navy); color: var(--white); }
    .btn-navy:hover { background: var(--navy-light); }
    .btn-gold { background: var(--gold); color: var(--navy); }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-muted { background: #ccc; color: var(--text); }
    .btn-muted:hover { background: #bbb; }
    .btn-danger { background: var(--danger); color: var(--white); font-size: 0.76rem; padding: 0.32rem 0.75rem; border-radius: 4px; }
    .btn-danger:hover { background: #e74c3c; transform: none; }
    .btn-edit { background: var(--navy-mid); color: var(--white); font-size: 0.76rem; padding: 0.32rem 0.75rem; border-radius: 4px; }
    .btn-edit:hover { background: var(--navy-light); transform: none; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-sm { font-size: 0.78rem; padding: 0.35rem 0.85rem; }

    #adminPanel { display: none; }

    .topbar {
      background: var(--white); border-radius: 10px; padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 10px rgba(5,21,45,0.08); flex-wrap: wrap; gap: 0.75rem;
    }
    .topbar h2 { color: var(--navy); font-size: 1.05rem; font-weight: normal; }
    .topbar-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    .section-card {
      background: var(--white); border-radius: 10px; margin-bottom: 1.5rem;
      box-shadow: 0 2px 10px rgba(5,21,45,0.08); overflow: hidden;
    }
    .section-head {
      background: var(--navy); color: var(--white); padding: 0.9rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-head h3 { font-size: 0.92rem; font-weight: 600; letter-spacing: 0.3px; }
    .section-body { padding: 1.25rem 1.5rem; }

    .record-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .record-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--cream);
    }
    .record-thumb { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
    .record-icon { width: 46px; height: 46px; border-radius: 6px; background: var(--navy-mid); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .record-info { flex: 1; min-width: 0; }
    .record-info strong { display: block; color: var(--navy); font-size: 0.92rem; }
    .record-info span { color: var(--gray); font-size: 0.8rem; }
    .record-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--gray); font-size: 0.88rem; }
    .empty-state em { display: block; font-size: 2rem; margin-bottom: 0.5rem; font-style: normal; }

    .live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .live-grid { grid-template-columns: 1fr; } }
    .checkbox-label {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 0.9rem; border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--navy); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(5,21,45,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 1rem;
      opacity: 0; pointer-events: none; transition: opacity 0.22s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--white); border-radius: 12px;
      width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(5,21,45,0.35); border-top: 4px solid var(--gold);
      transform: translateY(-20px) scale(0.97); transition: transform 0.22s;
    }
    .modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
    .modal-head {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .modal-head h3 { color: var(--navy); font-size: 1rem; }
    .modal-close { background: none; border: none; font-size: 1.4rem; color: var(--gray); cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--navy); }
    .modal-body { padding: 1.5rem; }
    .modal-foot {
      padding: 1rem 1.5rem; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 0.75rem;
      position: sticky; bottom: 0; background: var(--white); z-index: 1;
    }
    .req { color: #e74c3c; }

    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--navy); color: var(--white);
      padding: 0.7rem 1.75rem; border-radius: 6px;
      font-size: 0.85rem; border-left: 4px solid var(--gold);
      z-index: 10000; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="admin-header">
    <div>
      <h1>Saint Mary Coptic Orthodox Church</h1>
      <div class="sub">Admin Dashboard</div>
    </div>
    <a href="index.html" class="btn btn-gold" style="font-size:0.8rem;">⛪ View Website</a>
  </div>

  <div class="container">

    <!-- LOGIN -->
    <div id="loginView" class="login-card">
      <h2>Admin Login</h2>
      <p>Manage your church website content securely</p>
      <form onsubmit="event.preventDefault(); doLogin();">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-navy btn-full" style="margin-top:0.5rem; padding:0.8rem;">Login →</button>
      </form>
      <p class="login-hint">Default: <strong>admin</strong> / <strong>admin</strong></p>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel">

      <div class="topbar">
        <h2>Content Manager</h2>
        <div class="topbar-actions">
          <button class="btn btn-gold" onclick="downloadJSON()">📥 Export JSON</button>
          <button class="btn btn-muted" onclick="doLogout()">Logout</button>
        </div>
      </div>

      <!-- LIVE STREAM -->
      <div class="section-card">
        <div class="section-head">
          <h3>📺 Live Stream</h3>
          <button class="btn btn-gold btn-sm" onclick="saveLiveStream()">Save</button>
        </div>
        <div class="section-body">
          <div class="live-grid">
            <div class="form-group">
              <label>Stream Title</label>
              <input type="text" id="liveTitle" placeholder="Sunday Liturgy Live">
            </div>
            <div class="form-group">
              <label>YouTube Video ID</label>
              <input type="text" id="liveYoutubeId" placeholder="dQw4w9WgXcQ">
            </div>
            <div class="form-group">
              <label>Next Stream Time</label>
              <input type="text" id="liveNextStream" placeholder="Sunday, 10:00 AM">
            </div>
            <div class="form-group">
              <label>Stream Status</label>
              <label class="checkbox-label">
                <input type="checkbox" id="liveIsLive">
                <span>Currently Streaming Live</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- CLERGY -->
      <div class="section-card">
        <div class="section-head">
          <h3>⛪ Clergy &amp; Staff</h3>
          <button class="btn btn-gold btn-sm" onclick="openModal('clergy')">+ Add Clergy</button>
        </div>
        <div class="section-body">
          <div class="record-list" id="clergyList"></div>
        </div>
      </div>

      <!-- MINISTRIES -->
      <div class="section-card">
        <div class="section-head">
          <h3>🙏 Ministries</h3>
          <button class="btn btn-gold btn-sm" onclick="openModal('ministries')">+ Add Ministry</button>
        </div>
        <div class="section-body">
          <div class="record-list" id="ministriesList"></div>
        </div>
      </div>

      <!-- SCHEDULE -->
      <div class="section-card">
        <div class="section-head">
          <h3>📅 Weekly Schedule</h3>
          <button class="btn btn-gold btn-sm" onclick="openModal('schedule')">+ Add Service</button>
        </div>
        <div class="section-body">
          <div class="record-list" id="scheduleList"></div>
        </div>
      </div>

      <!-- SERMONS -->
      <div class="section-card">
        <div class="section-head">
          <h3>🎙️ Sermons</h3>
          <button class="btn btn-gold btn-sm" onclick="openModal('sermons')">+ Add Sermon</button>
        </div>
        <div class="section-body">
          <div class="record-list" id="sermonsList"></div>
        </div>
      </div>

      <!-- EVENTS -->
      <div class="section-card">
        <div class="section-head">
          <h3>📣 Events</h3>
          <button class="btn btn-gold btn-sm" onclick="openModal('events')">+ Add Event</button>
        </div>
        <div class="section-body">
          <div class="record-list" id="eventsList"></div>
        </div>
      </div>

      <!-- GALLERY -->
      <div class="section-card">
        <div class="section-head">
          <h3>🖼️ Gallery</h3>
          <button class="btn btn-gold btn-sm" onclick="openModal('gallery')">+ Add Photo</button>
        </div>
        <div class="section-body">
          <div class="record-list" id="galleryList"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modalOverlay" class="modal-overlay" onclick="handleBgClick(event)">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitle">Add Item</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot">
        <button class="btn btn-muted" onclick="closeModal()">Cancel</button>
        <button class="btn btn-navy" onclick="saveModal()">Save Record</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/admin.js"></script>
</body>
</html>
